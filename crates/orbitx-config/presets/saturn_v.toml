# Saturn V — 三级火箭 + 阿波罗载荷
# 参数来源：NASA Apollo News Reference

name = "Saturn V"
class = "SaturnV"

# S-IC 第一级：5 × F-1
[[stages]]
name = "S-IC"
dry_mass = 130000.0       # [kg]
fuel_mass = 2150000.0     # [kg] RP-1 + LOX
thrust = 34500000.0       # [N] 5 × 6.9 MN
isp = 263.0               # [s]
length = 42.0             # [m]
radius = 5.0              # [m]
separation_impulse = 4.0  # [m/s]
engine_dir = [0.0, 1.0, 0.0]
engine_pos = [0.0, -21.0, 0.0]
max_gimbal = 0.105        # [rad] TVC ±6°（F-1 发动机）
max_gimbal_rate = 0.26    # [rad/s] ~15°/s

# S-II 第二级：5 × J-2
[[stages]]
name = "S-II"
dry_mass = 36000.0        # [kg]
fuel_mass = 440000.0      # [kg] LH2 + LOX
thrust = 5000000.0        # [N] 5 × 1.0 MN
isp = 421.0               # [s]
length = 24.8             # [m]
radius = 5.0              # [m]
separation_impulse = 3.0  # [m/s]
engine_dir = [0.0, 1.0, 0.0]
engine_pos = [0.0, -12.0, 0.0]
max_gimbal = 0.087        # [rad] TVC ±5°（J-2 发动机）
max_gimbal_rate = 0.17    # [rad/s] ~10°/s

# S-IVB 第三级：1 × J-2
[[stages]]
name = "S-IVB"
dry_mass = 10000.0        # [kg]
fuel_mass = 110000.0      # [kg] LH2 + LOX
thrust = 1000000.0        # [N]
isp = 421.0               # [s]
length = 17.8             # [m]
radius = 3.3              # [m]
separation_impulse = 2.0  # [m/s]
engine_dir = [0.0, 1.0, 0.0]
engine_pos = [0.0, -8.5, 0.0]
max_gimbal = 0.087        # [rad] TVC ±5°（J-2 发动机）
max_gimbal_rate = 0.17    # [rad/s] ~10°/s

# 阿波罗指令服务舱 + 登月舱
[[stages]]
name = "CSM-LM"
dry_mass = 45000.0        # [kg]
fuel_mass = 0.0
thrust = 0.0
isp = 0.0
length = 10.0             # [m]
radius = 3.3              # [m]
separation_impulse = 1.5  # [m/s]
engine_dir = [0.0, 0.0, 0.0]
engine_pos = [0.0, 0.0, 0.0]
